; Boardsesh MoonBoard development firmware

[platformio]
default_envs = esp32s3dev

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    moonboard-protocol=symlink://../../libs/moonboard-protocol
    moonboard-uart-ble=symlink://../../libs/moonboard-uart-ble
    led-controller=symlink://../../libs/led-controller
    config-manager=symlink://../../libs/config-manager
    log-buffer=symlink://../../libs/log-buffer
    wifi-utils=symlink://../../libs/wifi-utils
    esp-web-server=symlink://../../libs/esp-web-server
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_NIMBLE_CPP_ATT_VALUE_INIT_LENGTH=512

[env:esp32s3dev]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = min_spiffs.csv

build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D FIRMWARE_BUILD_ENV=\"moonboard-esp32s3dev\"
