name: Cleanup PR Screenshots

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Delete PR screenshot branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Each PR owns its own `pr-screenshots/{N}` branch (created by the
      # `report-screenshots` job in e2e-tests.yml). On close/merge we delete
      # the whole branch — no path surgery needed, and if the branch was
      # never created (PR had no screenshot run) the 404 is a no-op.
      - name: Delete pr-screenshots/{PR} if it exists
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const ref = `heads/pr-screenshots/${pr}`;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
              core.info(`Deleted ref refs/${ref}`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`refs/${ref} does not exist — nothing to clean up.`);
                return;
              }
              throw err;
            }
