name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/web/**'
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    paths:
      - 'packages/web/**'
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# `runner.os` isn't available in workflow-level `env`, so the node_modules
# cache key is duplicated across jobs. Keep the shape identical — any drift
# between jobs creates separate cache buckets and defeats the whole point.
env:
  BUILT_PACKAGES_ARTIFACT: built-packages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  # ---------------------------------------------------------------------------
  # Typecheck — runs in parallel with `build`. Depends only on build:aurora
  # and build:constants so it fails fast without paying for the full web build.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (fail-fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build shared packages
        run: vp run build:aurora && vp run build:constants

      - name: Typecheck web
        run: bun run --filter=@boardsesh/web typecheck

      - name: Typecheck backend
        run: bun run --filter=boardsesh-backend typecheck

  # ---------------------------------------------------------------------------
  # Build — runs in parallel with typecheck. Produces a single artifact that
  # every downstream job downloads instead of rebuilding locally. This is the
  # main CI speedup: 1 build job × 3 min replaces 9 × 3 min of rebuilds across
  # the 8 e2e shards + screenshots.
  # ---------------------------------------------------------------------------
  build:
    name: Build packages (shared by e2e + screenshots)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache Next.js incremental build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('packages/web/**/*.ts', 'packages/web/**/*.tsx', 'packages/web/**/*.js', 'packages/web/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Build all packages
        # board-renderer-wasm ships pre-built pkg/ in git, so vp run build skips
        # its wasm-pack step. vp handles the build:shared → build:db → build:web
        # dependency graph internally.
        run: vp run build
        env:
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILT_PACKAGES_ARTIFACT }}
          # `.next/cache/` is build-time incremental compilation state that
          # `next start` never reads. Excluding it typically drops the
          # artifact size by 100-200MB, saving per-shard download time.
          path: |
            packages/web/.next/
            !packages/web/.next/cache/
            packages/backend/dist/
            packages/shared-schema/dist/
            packages/db/dist/
            packages/crypto/dist/
            packages/board-constants/dist/
            packages/aurora-sync/dist/
          if-no-files-found: error
          # One workflow run at a time; no need for long retention.
          retention-days: 1

  # ---------------------------------------------------------------------------
  # E2E shards — download the prebuilt artifact, skip the build step entirely.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (shard ${{ matrix.shard }})
    needs: [typecheck, build]
    timeout-minutes: 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    services:
      postgres:
        image: ghcr.io/boardsesh/boardsesh-dev-db:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: main
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 256mb

      neon-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        env:
          PG_CONNECTION_STRING: postgres://postgres:password@postgres:5432/main
          POSTGRES_DB: main

    steps:
      - uses: actions/checkout@v6

      - name: Point db.localtest.me to neon-proxy service
        run: |
          # Resolve the neon-proxy service IP and add a hosts entry so the
          # Neon driver's fetchEndpoint (http://db.localtest.me:4444/sql) reaches
          # the proxy container instead of localhost.
          PROXY_IP=$(getent hosts neon-proxy | awk '{ print $1 }')
          echo "$PROXY_IP db.localtest.me" >> /etc/hosts

      - name: Install unzip (required by setup-bun)
        run: apt-get update && apt-get install -y unzip

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILT_PACKAGES_ARTIFACT }}
          # The artifact preserves the source-tree layout (packages/web/.next
          # etc.) so extract into the repo root to put files back where the
          # `start` scripts expect them.
          path: .

      - name: Run database migrations
        run: bunx drizzle-kit migrate
        working-directory: packages/db
        env:
          DATABASE_URL: postgresql://postgres:password@postgres:5432/main

      - name: Start backend and web servers
        run: |
          bun run --filter=boardsesh-backend start > backend.log 2>&1 &
          bun run --filter=@boardsesh/web start > web.log 2>&1 &
          # Wait for both endpoints in parallel. Backend runs in local-only
          # pub/sub mode without REDIS_URL, which is fine for e2e coverage.
          bunx wait-on http-get://localhost:8080/health http://localhost:3000 --timeout 90000
        env:
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql

      - name: Run Playwright shard ${{ matrix.shard }}/8
        run: bunx playwright test --shard=${{ matrix.shard }}/8
        working-directory: packages/web
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql
          TEST_USER_EMAIL: test@boardsesh.com
          TEST_USER_PASSWORD: test

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== backend.log ==="
          cat backend.log || true
          echo "=== web.log ==="
          cat web.log || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-shard-${{ matrix.shard }}
          path: packages/web/test-results/
          retention-days: 7

      # Functional e2e shards don't generate screenshot assets.
      # Screenshot capture runs in the dedicated `screenshots` job below.

  # ---------------------------------------------------------------------------
  # Screenshots — like an e2e shard but runs the three screenshot Playwright
  # projects. Depends on `build` for the artifact and on `e2e` so we don't
  # publish screenshots of an app that didn't pass its functional tests.
  # ---------------------------------------------------------------------------
  screenshots:
    name: Capture PR screenshots
    needs: [typecheck, build, e2e]
    if: github.event_name == 'pull_request'
    # Soft-fail: a broken screenshot scene should leave the PR's required
    # checks green and let report-screenshots still update the comment.
    continue-on-error: true
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    services:
      postgres:
        image: ghcr.io/boardsesh/boardsesh-dev-db:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: main
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 256mb

      neon-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        env:
          PG_CONNECTION_STRING: postgres://postgres:password@postgres:5432/main
          POSTGRES_DB: main

    steps:
      - uses: actions/checkout@v6

      - name: Point db.localtest.me to neon-proxy service
        run: |
          PROXY_IP=$(getent hosts neon-proxy | awk '{ print $1 }')
          echo "$PROXY_IP db.localtest.me" >> /etc/hosts

      - name: Install unzip (required by setup-bun)
        run: apt-get update && apt-get install -y unzip

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-node-modules-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILT_PACKAGES_ARTIFACT }}
          path: .

      - name: Run database migrations
        run: bunx drizzle-kit migrate
        working-directory: packages/db
        env:
          DATABASE_URL: postgresql://postgres:password@postgres:5432/main

      - name: Start backend and web servers
        run: |
          bun run --filter=boardsesh-backend start > backend.log 2>&1 &
          bun run --filter=@boardsesh/web start > web.log 2>&1 &
          bunx wait-on http-get://localhost:8080/health http://localhost:3000 --timeout 90000
        env:
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql

      - name: Capture screenshots
        run: |
          bunx playwright test \
            --project=app-store-screenshots \
            --project=layout-screenshots \
            --project=help-screenshots
        working-directory: packages/web
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql
          TEST_USER_EMAIL: test@boardsesh.com
          TEST_USER_PASSWORD: test

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== backend.log ==="
          cat backend.log || true
          echo "=== web.log ==="
          cat web.log || true

      - name: Stage screenshots for upload
        if: always()
        run: |
          mkdir -p screenshots-out/app-store screenshots-out/layouts screenshots-out/help
          cp mobile/screenshots/*.png                     screenshots-out/app-store/ 2>/dev/null || true
          cp packages/web/e2e/screenshots/layouts/*.png    screenshots-out/layouts/   2>/dev/null || true
          cp packages/web/public/help/*.png                screenshots-out/help/      2>/dev/null || true
          ls -R screenshots-out || true

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-current
          path: screenshots-out/
          if-no-files-found: warn
          retention-days: 14

  report-screenshots:
    name: Report screenshots on PR
    needs: screenshots
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download screenshots artifact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: screenshots-current
          path: screenshots-out/

      - name: Push screenshots to per-PR branch
        id: push
        if: steps.dl.outcome == 'success'
        run: |
          set -e
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          PR_NUMBER="${{ github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="pr-screenshots/${PR_NUMBER}"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git worktree add /tmp/ss-branch "$BRANCH"
          else
            git worktree add --orphan -b "$BRANCH" /tmp/ss-branch
          fi

          # Per-SHA subpath so each commit's URLs are unique — cached browser
          # views never serve stale bytes when a PR pushes follow-up commits.
          mkdir -p "/tmp/ss-branch/${SHORT_SHA}/app-store" \
                   "/tmp/ss-branch/${SHORT_SHA}/layouts" \
                   "/tmp/ss-branch/${SHORT_SHA}/help"

          cp screenshots-out/app-store/*.png "/tmp/ss-branch/${SHORT_SHA}/app-store/" 2>/dev/null || true
          cp screenshots-out/layouts/*.png  "/tmp/ss-branch/${SHORT_SHA}/layouts/"  2>/dev/null || true
          cp screenshots-out/help/*.png     "/tmp/ss-branch/${SHORT_SHA}/help/"     2>/dev/null || true

          cd /tmp/ss-branch
          git add "${SHORT_SHA}"
          if git commit -m "screenshots: PR #${PR_NUMBER} @ ${SHORT_SHA}"; then
            git push origin "$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build screenshot gallery
        run: |
          node << 'NODEEOF'
          const fs = require('fs');
          const path = require('path');

          const pr       = process.env.PR;
          const repo     = process.env.REPO;
          const fullSha  = process.env.SHA;
          const shortSha = fullSha.slice(0, 7);
          const runUrl   = `${process.env.GH_SERVER}/${repo}/actions/runs/${process.env.RUN_ID}`;
          const pushed   = process.env.PUSHED === 'true';

          const base = `https://raw.githubusercontent.com/${repo}/pr-screenshots/${pr}/${shortSha}`;

          function listPngs(subdir) {
            const dir = path.join('screenshots-out', subdir);
            if (!fs.existsSync(dir)) return [];
            return fs
              .readdirSync(dir)
              .filter((f) => f.endsWith('.png'))
              .sort();
          }

          function table(files, subdir, cols = 3) {
            const rows = ['<table>'];
            files.forEach((f, i) => {
              const name = f.replace('.png', '');
              const url = `${base}/${subdir}/${f}`;
              if (i % cols === 0) {
                if (i) rows.push('</tr>');
                rows.push('<tr>');
              }
              rows.push(
                `<td align="center"><a href="${url}"><img src="${url}" width="160"></a><br><sub><code>${name}</code></sub></td>`,
              );
            });
            rows.push('</tr>', '</table>');
            return rows;
          }

          const app    = listPngs('app-store');
          const layout = listPngs('layouts');
          const help   = listPngs('help');

          const out = [`### E2E Screenshots`, '', `Run: [\`${shortSha}\`](${runUrl})`, ''];
          if (!pushed) {
            out.push('_Screenshot capture failed for this commit — see the [Actions run](' + runUrl + ') for details._');
          } else if (!app.length && !layout.length && !help.length) {
            out.push('_No screenshots rendered._');
          } else {
            if (app.length) out.push('**App flow** (iPhone 16 Pro Max)', '', ...table(app, 'app-store'), '');
            if (layout.length) out.push('**Board layouts**', '', ...table(layout, 'layouts'), '');
            if (help.length) out.push('**Help docs**', '', ...table(help, 'help'), '');
          }

          fs.writeFileSync('summary.md', out.join('\n'));
          NODEEOF
        env:
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          GH_SERVER: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PUSHED: ${{ steps.push.outputs.pushed }}

      - name: Upsert sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-screenshots
          path: summary.md
