name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/web/**'
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    paths:
      - 'packages/web/**'
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (fail-fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        run: |
          bun run --filter=@boardsesh/shared-schema build
          bun run --filter=@boardsesh/crypto build
          bun run --filter=@boardsesh/board-constants build
          bun run --filter=@boardsesh/db build
          bun run --filter=@boardsesh/aurora-sync build

      - name: Typecheck web
        run: bun run typecheck:web

      - name: Typecheck backend
        run: bun run typecheck:backend

  e2e:
    name: E2E (shard ${{ matrix.shard }})
    needs: typecheck
    timeout-minutes: 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    services:
      postgres:
        image: ghcr.io/boardsesh/boardsesh-dev-db:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: main
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 256mb

      neon-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        env:
          PG_CONNECTION_STRING: postgres://postgres:password@postgres:5432/main
          POSTGRES_DB: main

    steps:
      - uses: actions/checkout@v6

      - name: Point db.localtest.me to neon-proxy service
        run: |
          # Resolve the neon-proxy service IP and add a hosts entry so the
          # Neon driver's fetchEndpoint (http://db.localtest.me:4444/sql) reaches
          # the proxy container instead of localhost.
          PROXY_IP=$(getent hosts neon-proxy | awk '{ print $1 }')
          echo "$PROXY_IP db.localtest.me" >> /etc/hosts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install unzip (required by setup-bun)
        run: apt-get update && apt-get install -y unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: packages/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('packages/web/**/*.ts', 'packages/web/**/*.tsx', 'packages/web/**/*.js', 'packages/web/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages needed for e2e
        # board-renderer-wasm ships pre-built pkg/ in git, so skip its bash build.sh
        # (needs wasm-pack). Build the rest explicitly so we don't run every
        # workspace's build script.
        run: |
          bun run --filter=@boardsesh/shared-schema build
          bun run --filter=@boardsesh/crypto build
          bun run --filter=@boardsesh/board-constants build
          bun run --filter=@boardsesh/db build
          bun run --filter=@boardsesh/aurora-sync build
          bun run --filter=boardsesh-backend build
          bun run --filter=@boardsesh/web build
        env:
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql

      - name: Run database migrations
        run: bunx drizzle-kit migrate
        working-directory: packages/db
        env:
          DATABASE_URL: postgresql://postgres:password@postgres:5432/main

      - name: Start backend and web servers
        run: |
          bun run --filter=boardsesh-backend start > backend.log 2>&1 &
          bun run --filter=@boardsesh/web start > web.log 2>&1 &
          # Wait for both endpoints in parallel. Backend runs in local-only
          # pub/sub mode without REDIS_URL, which is fine for e2e coverage.
          bunx wait-on http-get://localhost:8080/health http://localhost:3000 --timeout 90000
        env:
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql

      - name: Run Playwright shard ${{ matrix.shard }}/4
        run: bunx playwright test --shard=${{ matrix.shard }}/4
        working-directory: packages/web
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:password@db.localtest.me:5432/main
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/graphql
          TEST_USER_EMAIL: test@boardsesh.com
          TEST_USER_PASSWORD: test

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== backend.log ==="
          cat backend.log || true
          echo "=== web.log ==="
          cat web.log || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-shard-${{ matrix.shard }}
          path: packages/web/test-results/
          retention-days: 7

      - name: Upload rendered screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: |
            mobile/screenshots/
            packages/web/public/help/
          if-no-files-found: ignore
          retention-days: 14

  report-screenshots:
    name: Report screenshots on PR
    needs: e2e
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          path: screenshot-artifacts
          pattern: screenshots-shard-*
          merge-multiple: false

      - name: Push screenshots to test-screenshots branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          PR_NUMBER="${{ github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          BRANCH="test-screenshots"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git worktree add /tmp/ss-branch "$BRANCH"
          else
            git worktree add --orphan -b "$BRANCH" /tmp/ss-branch
          fi

          rm -rf "/tmp/ss-branch/pr-${PR_NUMBER}"
          mkdir -p "/tmp/ss-branch/pr-${PR_NUMBER}/app-store" \
                   "/tmp/ss-branch/pr-${PR_NUMBER}/help"

          find screenshot-artifacts -type f -name '*.png' | while read -r f; do
            if echo "$f" | grep -q "mobile/screenshots"; then
              cp "$f" "/tmp/ss-branch/pr-${PR_NUMBER}/app-store/"
            else
              cp "$f" "/tmp/ss-branch/pr-${PR_NUMBER}/help/"
            fi
          done

          cd /tmp/ss-branch
          git add "pr-${PR_NUMBER}"
          git commit -m "screenshots: PR #${PR_NUMBER} @ ${SHA:0:7}" \
            || echo "nothing to commit"
          git push origin "$BRANCH"

      - name: Build screenshot gallery
        run: |
          python3 << 'PYEOF'
          import os, glob

          pr   = "${{ github.event.pull_request.number }}"
          repo = "${{ github.repository }}"
          sha  = "${{ github.event.pull_request.head.sha }}"
          run  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          base = f"https://raw.githubusercontent.com/{repo}/test-screenshots/pr-{pr}"

          app = sorted(glob.glob(f"/tmp/ss-branch/pr-{pr}/app-store/*.png"))
          hlp = sorted(glob.glob(f"/tmp/ss-branch/pr-{pr}/help/*.png"))

          def table(shots, subdir, cols=3):
              rows = ["<table>"]
              for i, f in enumerate(shots):
                  name = os.path.basename(f).replace(".png", "")
                  url  = f"{base}/{subdir}/{os.path.basename(f)}"
                  if i % cols == 0:
                      if i:
                          rows.append("</tr>")
                      rows.append("<tr>")
                  rows.append(
                      f'<td align="center">'
                      f'<a href="{url}"><img src="{url}" width="160"></a>'
                      f'<br><sub><code>{name}</code></sub></td>'
                  )
              rows += ["</tr>", "</table>"]
              return rows

          out = ["### E2E Screenshots", "", f"Run: [`{sha[:7]}`]({run})", ""]
          if app:
              out += ["**App Store Screenshots** (iPhone 16 Pro Max)", ""] + table(app, "app-store") + [""]
          if hlp:
              out += ["**Help Screenshots**", ""] + table(hlp, "help") + [""]
          if not app and not hlp:
              out.append("_No screenshots rendered._")

          open("summary.md", "w").write("\n".join(out))
          PYEOF

      - name: Upsert sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-screenshots
          path: summary.md
