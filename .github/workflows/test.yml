name: Web Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/web/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'packages/web/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/test.yml'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        run: vp run build:db

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: |
            packages/shared-schema/dist
            packages/db/dist
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Run type checking
        run: bun run --filter=@boardsesh/web typecheck

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      # actions/checkout on a pull_request event fetches only the PR merge ref,
      # so `origin/main` isn't present locally and vitest's `--changed` silently
      # matches zero files. Fetch the base ref explicitly so the diff works.
      - name: Fetch base ref for vitest --changed
        if: github.event_name == 'pull_request'
        run: git fetch --depth=50 origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run --filter=@boardsesh/web test:run -- --changed "origin/${{ github.base_ref }}" --reporter=verbose --reporter=github-actions --reporter=junit --outputFile.junit=./test-results/junit.xml
          else
            bun run --filter=@boardsesh/web test:run -- --reporter=verbose --reporter=github-actions --reporter=junit --outputFile.junit=./test-results/junit.xml
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-results
          path: packages/web/test-results/junit.xml
          retention-days: 7
