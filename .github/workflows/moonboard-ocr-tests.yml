name: MoonBoard OCR Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/moonboard-ocr/**'
      - '.github/workflows/moonboard-ocr-tests.yml'
  pull_request:
    paths:
      - 'packages/moonboard-ocr/**'
      - '.github/workflows/moonboard-ocr-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - uses: oven-sh/setup-bun@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run OCR tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run --filter=@boardsesh/moonboard-ocr test -- --changed "origin/${{ github.base_ref }}"
          else
            bun run --filter=@boardsesh/moonboard-ocr test
          fi
