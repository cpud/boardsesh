name: Publish Test Reports

# Runs after the CI workflows complete — including PRs from forks.
# The workflow_run trigger executes in the base repo context, so
# GITHUB_TOKEN has checks:write permission even for forked PRs.
on:
  workflow_run:
    workflows: ['Web Tests', 'Backend Integration Tests']
    types:
      - completed

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  publish-web-tests:
    if: github.event.workflow.name == 'Web Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Publish Web Unit Tests report
        uses: turing85/publish-report@v2
        with:
          checkout: 'true'
          download-artifact-name: web-test-results
          download-artifact-run-id: ${{ github.event.workflow_run.id }}
          comment-header: web-test-report
          comment-enabled: 'true'
          report-name: Web Unit Tests
          report-path: '**/*.xml'
          report-reporter: java-junit
          report-fail-on-error: false

  publish-backend-tests:
    if: github.event.workflow.name == 'Backend Integration Tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: backend-test-results-*
          path: test-results
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Backend Integration Tests report
        uses: turing85/publish-report@v2
        with:
          comment-header: backend-test-report
          comment-enabled: 'true'
          report-name: Backend Integration Tests
          report-path: 'test-results/**/*.xml'
          report-reporter: java-junit
          report-fail-on-error: false
