name: Backend Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    services:
      postgres:
        image: ghcr.io/boardsesh/boardsesh-postgres-postgis:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boardsesh_backend_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared-schema
        run: bun run --filter=@boardsesh/shared-schema build

      - name: Build db package
        run: bun run --filter=@boardsesh/db build

      - name: Run backend integration tests (shard ${{ matrix.shard }}/2)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run --filter=boardsesh-backend test:run -- --changed "origin/${{ github.base_ref }}" --shard=${{ matrix.shard }}/2 --reporter=verbose --reporter=junit --outputFile.junit=./test-results/junit.xml
          else
            bun run --filter=boardsesh-backend test:run -- --shard=${{ matrix.shard }}/2 --reporter=verbose --reporter=junit --outputFile.junit=./test-results/junit.xml
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/boardsesh_backend_test
          REDIS_URL: redis://localhost:6380

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-${{ matrix.shard }}
          path: packages/backend/test-results/junit.xml
          retention-days: 7

  report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: backend-test-results-*
          path: test-results
          merge-multiple: false

      - name: Publish test report
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration Tests
          path: 'test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false
