name: Backend Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    services:
      postgres:
        image: ghcr.io/boardsesh/boardsesh-postgres-postgis:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boardsesh_backend_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared-schema
        run: bun run --filter=@boardsesh/shared-schema build

      - name: Build db package
        run: bun run --filter=@boardsesh/db build

      - name: Run backend integration tests
        run: bun run --filter=boardsesh-backend test:run -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/junit.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/boardsesh_backend_test
          REDIS_URL: redis://localhost:6380

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: packages/backend/test-results/junit.xml
          retention-days: 7

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Integration Tests
          path: packages/backend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
